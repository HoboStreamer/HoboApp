# ═══════════════════════════════════════════════════════════════
# HoboDocs — Nginx Vhost
# Single backend serving all document/PDF subdomain hostnames.
# ═══════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=hobodocs_api:10m rate=5r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name
        docs.hobo.tools
        pdf.hobo.tools
        mergepdf.hobo.tools splitpdf.hobo.tools compresspdf.hobo.tools
        rotatepdf.hobo.tools reorderpdf.hobo.tools watermarkpdf.hobo.tools
        protectpdf.hobo.tools unlockpdf.hobo.tools
        image2pdf.hobo.tools jpg2pdf.hobo.tools png2pdf.hobo.tools
        pdf2jpg.hobo.tools pdf2png.hobo.tools;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name
        docs.hobo.tools
        pdf.hobo.tools
        mergepdf.hobo.tools splitpdf.hobo.tools compresspdf.hobo.tools
        rotatepdf.hobo.tools reorderpdf.hobo.tools watermarkpdf.hobo.tools
        protectpdf.hobo.tools unlockpdf.hobo.tools
        image2pdf.hobo.tools jpg2pdf.hobo.tools png2pdf.hobo.tools
        pdf2jpg.hobo.tools pdf2png.hobo.tools;

    ssl_certificate     /etc/letsencrypt/live/hobo.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hobo.tools/privkey.pem;

    access_log /var/log/nginx/docs.hobo.tools.access.log;
    error_log  /var/log/nginx/docs.hobo.tools.error.log;

    # Allow larger uploads for PDF files
    client_max_body_size 100m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API routes (rate limited)
    location /api/ {
        limit_req zone=hobodocs_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3700;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for PDF processing
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static assets + SPA fallback
    location / {
        proxy_pass http://127.0.0.1:3700;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
