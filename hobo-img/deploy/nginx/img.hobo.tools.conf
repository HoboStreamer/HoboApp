# ═══════════════════════════════════════════════════════════════
# HoboImg — Nginx Vhost
# Single backend serving all image format + utility subdomains.
# ═══════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=hoboimg_api:10m rate=5r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name
        img.hobo.tools
        png.hobo.tools jpg.hobo.tools jpeg.hobo.tools
        webp.hobo.tools avif.hobo.tools
        heic.hobo.tools heif.hobo.tools
        svg.hobo.tools gif.hobo.tools ico.hobo.tools
        tiff.hobo.tools bmp.hobo.tools
        compress.hobo.tools resize.hobo.tools crop.hobo.tools
        convert.hobo.tools favicon.hobo.tools;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name
        img.hobo.tools
        png.hobo.tools jpg.hobo.tools jpeg.hobo.tools
        webp.hobo.tools avif.hobo.tools
        heic.hobo.tools heif.hobo.tools
        svg.hobo.tools gif.hobo.tools ico.hobo.tools
        tiff.hobo.tools bmp.hobo.tools
        compress.hobo.tools resize.hobo.tools crop.hobo.tools
        convert.hobo.tools favicon.hobo.tools;

    ssl_certificate     /etc/letsencrypt/live/hobo.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hobo.tools/privkey.pem;

    access_log /var/log/nginx/img.hobo.tools.access.log;
    error_log  /var/log/nginx/img.hobo.tools.error.log;

    # Allow larger uploads for image files
    client_max_body_size 50m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API routes (rate limited)
    location /api/ {
        limit_req zone=hoboimg_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for image processing
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static assets + SPA fallback
    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
