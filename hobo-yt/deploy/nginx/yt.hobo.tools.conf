# Rate limiting zone
limit_req_zone $binary_remote_addr zone=hoboyt_api:10m rate=2r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yt.hobo.tools;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yt.hobo.tools;

    # SSL — wildcard cert
    ssl_certificate     /etc/letsencrypt/live/hobo.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hobo.tools/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Downloads can be large
    client_max_body_size 2m;

    # SSE — no buffering for streaming progress
    location ~ ^/api/status/.+/stream$ {
        proxy_pass http://127.0.0.1:3401;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 600s;
    }

    # Download endpoint — large files, long timeout
    location ~ ^/api/download/ {
        proxy_pass http://127.0.0.1:3401;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # API endpoints — rate limited
    location /api/ {
        limit_req zone=hoboyt_api burst=10 nodelay;

        proxy_pass http://127.0.0.1:3401;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Static + SPA
    location / {
        proxy_pass http://127.0.0.1:3401;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
