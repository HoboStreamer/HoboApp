# ═══════════════════════════════════════════════════════════════
# HoboAudio — Nginx Vhost
# Single backend serving all audio format + tool subdomains.
# ═══════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=hoboaudio_api:10m rate=5r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name
        audio.hobo.tools
        mp3.hobo.tools wav.hobo.tools flac.hobo.tools
        ogg.hobo.tools m4a.hobo.tools aac.hobo.tools
        opus.hobo.tools wma.hobo.tools aiff.hobo.tools ac3.hobo.tools
        trim.hobo.tools merge.hobo.tools
        pitch.hobo.tools speed.hobo.tools reverse.hobo.tools
        normalize.hobo.tools fade.hobo.tools loop.hobo.tools
        bass.hobo.tools equalizer.hobo.tools
        vocal.hobo.tools karaoke.hobo.tools
        extract.hobo.tools waveform.hobo.tools
        ringtone.hobo.tools podcast.hobo.tools
        voice.hobo.tools noise.hobo.tools
        bitcrusher.hobo.tools echo.hobo.tools
        reverb.hobo.tools chorus.hobo.tools
        distortion.hobo.tools compressor.hobo.tools
        stereo.hobo.tools silence.hobo.tools
        metadata.hobo.tools convert.audio.hobo.tools;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name
        audio.hobo.tools
        mp3.hobo.tools wav.hobo.tools flac.hobo.tools
        ogg.hobo.tools m4a.hobo.tools aac.hobo.tools
        opus.hobo.tools wma.hobo.tools aiff.hobo.tools ac3.hobo.tools
        trim.hobo.tools merge.hobo.tools
        pitch.hobo.tools speed.hobo.tools reverse.hobo.tools
        normalize.hobo.tools fade.hobo.tools loop.hobo.tools
        bass.hobo.tools equalizer.hobo.tools
        vocal.hobo.tools karaoke.hobo.tools
        extract.hobo.tools waveform.hobo.tools
        ringtone.hobo.tools podcast.hobo.tools
        voice.hobo.tools noise.hobo.tools
        bitcrusher.hobo.tools echo.hobo.tools
        reverb.hobo.tools chorus.hobo.tools
        distortion.hobo.tools compressor.hobo.tools
        stereo.hobo.tools silence.hobo.tools
        metadata.hobo.tools convert.audio.hobo.tools;

    ssl_certificate     /etc/letsencrypt/live/hobo.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hobo.tools/privkey.pem;

    access_log /var/log/nginx/audio.hobo.tools.access.log;
    error_log  /var/log/nginx/audio.hobo.tools.error.log;

    # Allow larger uploads for audio/video files
    client_max_body_size 100m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API routes (rate limited)
    location /api/ {
        limit_req zone=hoboaudio_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for audio processing
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Static assets + SPA fallback
    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
