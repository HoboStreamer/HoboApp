<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoboNet — Network & Internet Diagnostics</title>
    <meta name="description" content="Free online network tools — ping, DNS lookup, GeoIP, SSL checker, HTTP headers, Whois/RDAP, traceroute, port scanner, and more. No login required.">
    <meta property="og:title" content="HoboNet — Network & Internet Diagnostics">
    <meta property="og:description" content="Free online network tools — ping, DNS lookup, GeoIP, SSL checker, HTTP headers, Whois/RDAP, and more.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://net.hobo.tools">
    <link rel="canonical" href="https://net.hobo.tools">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0b0c12;
            --bg-secondary: #12131c;
            --bg-tertiary: #1a1b28;
            --bg-card: rgba(22, 24, 36, 0.85);
            --bg-hover: #252738;
            --bg-input: #181926;
            --text-primary: #f1f4fb;
            --text-secondary: #a0a8c4;
            --text-muted: #5e6580;
            --accent: #c0965c;
            --accent-light: #e1b77d;
            --accent-dark: #9f7337;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #3b82f6;
            --cyan: #06b6d4;
            --border: rgba(255,255,255,0.07);
            --border-light: rgba(255,255,255,0.12);
            --shadow: 0 24px 64px rgba(0,0,0,0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { background: var(--bg-primary); scroll-behavior: smooth; }
        body {
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--accent-light); text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { font: inherit; cursor: pointer; border: none; background: none; }

        /* ─── Background glow ─── */
        .bg-glow { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .bg-glow::before, .bg-glow::after {
            content: ''; position: absolute; border-radius: 50%;
            filter: blur(120px); opacity: 0.35;
            animation: glow-drift 20s ease-in-out infinite alternate;
        }
        .bg-glow::before { width: 500px; height: 500px; top: -5%; left: 25%; background: radial-gradient(circle, rgba(6,182,212,0.3), transparent 70%); }
        .bg-glow::after { width: 400px; height: 400px; bottom: 10%; right: 15%; background: radial-gradient(circle, rgba(192,150,92,0.25), transparent 70%); animation-delay: -10s; }
        @keyframes glow-drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px,-20px) scale(1.1); } }

        .page { position: relative; z-index: 1; min-height: 100vh; }
        .shell { width: min(1100px, calc(100% - 32px)); margin: 0 auto; }

        /* ─── Navbar placeholder ─── */
        .nav-placeholder { height: 52px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }

        /* ─── Hero ─── */
        .hero { text-align: center; padding: 48px 0 24px; }
        .hero-icon { font-size: 40px; color: var(--cyan); margin-bottom: 12px; }
        .hero h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -.5px; margin-bottom: 8px; }
        .hero h1 .accent { color: var(--cyan); }
        .hero .sub { color: var(--text-secondary); font-size: 1rem; max-width: 560px; margin: 0 auto; line-height: 1.5; }

        /* ─── Search bar ─── */
        .search-bar {
            display: flex; gap: 8px; max-width: 640px; margin: 24px auto 0;
            background: var(--bg-input); border: 1px solid var(--border-light);
            border-radius: 14px; padding: 6px 6px 6px 16px; align-items: center;
            transition: border-color .2s;
        }
        .search-bar:focus-within { border-color: var(--cyan); }
        .search-bar input {
            flex: 1; background: none; border: none; outline: none;
            font-size: 15px; color: var(--text-primary); padding: 10px 0;
            font-family: var(--mono);
        }
        .search-bar input::placeholder { color: var(--text-muted); font-family: 'Inter', sans-serif; }
        .search-bar .btn-go {
            padding: 10px 24px; border-radius: 10px; font-weight: 600; font-size: 14px;
            background: var(--cyan); color: #fff; white-space: nowrap;
            transition: background .15s, transform .1s;
        }
        .search-bar .btn-go:hover { background: #0891b2; }
        .search-bar .btn-go:active { transform: scale(0.97); }

        /* ─── Tool chips (quick-pick on hub) ─── */
        .tool-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 16px; }
        .tool-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 8px;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            font-size: 12px; color: var(--text-secondary); font-weight: 500;
            transition: all .15s; cursor: pointer;
        }
        .tool-chip:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }
        .tool-chip.active { background: rgba(6,182,212,0.12); border-color: var(--cyan); color: var(--cyan); }
        .tool-chip i { font-size: 11px; opacity: 0.7; }

        /* ─── Tool selector row (shown on individual tool pages) ─── */
        .tool-selector { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
        .tool-selector .ts-btn {
            padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            color: var(--text-secondary); transition: all .15s;
        }
        .tool-selector .ts-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .tool-selector .ts-btn.active { background: rgba(6,182,212,0.15); border-color: var(--cyan); color: var(--cyan); }

        /* ─── Options row ─── */
        .options-row {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
            margin-top: 12px; font-size: 13px;
        }
        .options-row label {
            display: flex; align-items: center; gap: 4px; color: var(--text-secondary);
            cursor: pointer;
        }
        .options-row select, .options-row input[type="text"] {
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 6px; padding: 4px 8px; color: var(--text-primary);
            font-size: 12px; font-family: var(--mono);
        }

        /* ─── Results area ─── */
        .results { margin-top: 28px; padding-bottom: 60px; }

        /* Status badges row */
        .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; justify-content: center; }
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
            background: var(--bg-tertiary); border: 1px solid var(--border);
        }
        .badge-green { color: var(--green); border-color: rgba(34,197,94,0.25); background: rgba(34,197,94,0.08); }
        .badge-red { color: var(--red); border-color: rgba(239,68,68,0.25); background: rgba(239,68,68,0.08); }
        .badge-yellow { color: var(--yellow); border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.08); }
        .badge-blue { color: var(--blue); border-color: rgba(59,130,246,0.25); background: rgba(59,130,246,0.08); }
        .badge-cyan { color: var(--cyan); border-color: rgba(6,182,212,0.25); background: rgba(6,182,212,0.08); }

        /* Result card */
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px 24px; margin-bottom: 14px;
            backdrop-filter: blur(16px);
        }
        .card-head {
            display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
            font-size: 14px; font-weight: 700; color: var(--cyan);
        }
        .card-head i { font-size: 13px; }

        /* Result table */
        .res-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .res-table th {
            text-align: left; padding: 6px 10px; color: var(--text-muted);
            font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
        }
        .res-table td {
            padding: 7px 10px; border-bottom: 1px solid var(--border);
            color: var(--text-secondary); word-break: break-all;
        }
        .res-table tr:last-child td { border-bottom: none; }
        .res-table .val { color: var(--text-primary); font-family: var(--mono); font-size: 12px; }
        .res-table .key { color: var(--text-muted); font-weight: 600; white-space: nowrap; min-width: 120px; }

        /* Code block (raw output) */
        .raw-block {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 14px 16px;
            font-family: var(--mono); font-size: 12px; color: var(--text-secondary);
            overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap;
            line-height: 1.5;
        }

        /* Loading spinner */
        .loading { text-align: center; padding: 40px 0; color: var(--text-muted); }
        .loading i { font-size: 24px; color: var(--cyan); margin-bottom: 8px; }
        .loading p { font-size: 13px; margin-top: 8px; }

        /* Error state */
        .error-msg {
            text-align: center; padding: 24px;
            background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2);
            border-radius: var(--radius-sm); color: var(--red); font-size: 14px;
        }

        /* Pivot link */
        .pivot {
            display: inline-flex; align-items: center; gap: 4px;
            color: var(--cyan); font-size: 12px; cursor: pointer; font-weight: 500;
        }
        .pivot:hover { text-decoration: underline; }

        /* ─── Hub: tool grid ─── */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px; margin-top: 20px;
        }
        .tool-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 16px 18px;
            display: flex; align-items: flex-start; gap: 12px;
            transition: all .2s; cursor: pointer; text-decoration: none; color: inherit;
        }
        .tool-card:hover { background: var(--bg-hover); border-color: var(--border-light); transform: translateY(-2px); text-decoration: none; }
        .tool-card .tc-icon {
            width: 38px; height: 38px; border-radius: 10px;
            background: rgba(6,182,212,0.1); color: var(--cyan);
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            flex-shrink: 0;
        }
        .tool-card .tc-info h3 { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
        .tool-card .tc-info p { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
        .tool-card .tc-domain { font-size: 11px; color: var(--text-muted); font-family: var(--mono); margin-top: 4px; }

        /* ─── Hub: category groups ─── */
        .cat-group { margin-top: 32px; }
        .cat-group h2 {
            font-size: 16px; font-weight: 700; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px; color: var(--text-primary);
        }
        .cat-group h2 i { color: var(--cyan); font-size: 14px; }

        /* ─── MyIP special card ─── */
        .myip-card {
            background: linear-gradient(135deg, rgba(6,182,212,0.08), rgba(192,150,92,0.06));
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: var(--radius); padding: 24px; text-align: center;
            margin: 20px auto; max-width: 500px;
        }
        .myip-card .ip-display {
            font-size: 1.8rem; font-weight: 800; font-family: var(--mono);
            color: var(--cyan); margin: 12px 0 4px; word-break: break-all;
        }
        .myip-card .ip-meta { font-size: 13px; color: var(--text-secondary); }
        .myip-card .copy-btn {
            margin-top: 10px; padding: 6px 16px; border-radius: 8px;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            color: var(--text-secondary); font-size: 12px; font-weight: 500;
            transition: all .15s;
        }
        .myip-card .copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

        /* ─── Tabs (for lookup supertool) ─── */
        .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
        .tab-btn {
            padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--text-muted);
            border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text-secondary); }
        .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ─── Footer ─── */
        .footer {
            text-align: center; padding: 32px 0; margin-top: 40px;
            border-top: 1px solid var(--border); color: var(--text-muted); font-size: 12px;
        }
        .footer a { color: var(--text-secondary); }
        .footer .footer-links { display: flex; gap: 16px; justify-content: center; margin-bottom: 8px; flex-wrap: wrap; }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            .hero h1 { font-size: 1.6rem; }
            .hero { padding: 32px 0 16px; }
            .search-bar { flex-direction: column; padding: 8px; }
            .search-bar input { padding: 12px 8px; }
            .search-bar .btn-go { width: 100%; text-align: center; padding: 12px; }
            .tool-grid { grid-template-columns: 1fr; }
            .res-table .key { min-width: 80px; }
        }

        /* ─── Toast ─── */
        .toast-container { position: fixed; top: 60px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary);
            animation: toast-in .2s ease; min-width: 200px; backdrop-filter: blur(12px);
        }
        .toast.info { border-color: rgba(6,182,212,0.3); }
        .toast.error { border-color: rgba(239,68,68,0.3); color: var(--red); }
        @keyframes toast-in { from { opacity: 0; transform: translateX(20px); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="page">
        <!-- Navbar injected by HoboNavbar.init() -->
        <div class="nav-placeholder" id="navbar-mount"></div>

        <!-- Hero -->
        <div class="hero shell" id="hero">
            <div class="hero-icon"><i class="fa-solid fa-network-wired"></i></div>
            <h1><span class="accent">Hobo</span>Net</h1>
            <p class="sub">Free online network diagnostics — DNS, GeoIP, ping, SSL, Whois, HTTP headers, and more. No login required.</p>
        </div>

        <!-- Search -->
        <div class="shell">
            <div class="search-bar" id="search-bar">
                <input type="text" id="search-input" placeholder="Enter a domain, IP, or URL…" autocomplete="off" spellcheck="false">
                <button class="btn-go" id="btn-go" onclick="runTool()"><i class="fa-solid fa-magnifying-glass"></i> Lookup</button>
            </div>

            <!-- Tool selector (shown on individual pages) / Tool chips (shown on hub) -->
            <div id="tool-chips-area"></div>
            <div id="options-area"></div>
        </div>

        <!-- Results -->
        <div class="shell results" id="results"></div>

        <!-- Hub: tool directory (shown on net.hobo.tools) -->
        <div class="shell" id="hub-directory" style="display:none"></div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-links">
                <a href="https://hobo.tools">Hobo Network</a>
                <a href="https://net.hobo.tools">HoboNet</a>
                <a href="https://hobostreamer.com">HoboStreamer</a>
                <a href="https://hobo.quest">HoboQuest</a>
            </div>
            <p>Part of the <a href="https://hobo.tools">Hobo Network</a>. Free. Open source. No tracking.</p>
        </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <!-- Shared Hobo Navbar -->
    <script src="https://hobo.tools/shared/navbar.js"></script>
    <script src="https://hobo.tools/shared/theme-loader.js"></script>
    <script>
    'use strict';

    // ═══════════════════════════════════════════════════════════
    // HoboNet — Client-Side App
    // Detects subdomain to determine active tool, renders UI,
    // calls /api/net/* endpoints on hobo.tools.
    // ═══════════════════════════════════════════════════════════

    const API_BASE = 'https://hobo.tools/api/net';

    // ── Tool definitions (mirrors server/net/config.js) ──────
    const TOOLS = {
        // Hub
        net:              { name: 'HoboNet',            icon: 'fa-network-wired',     cat: 'hub',   endpoint: null,        placeholder: 'Enter a domain, IP, or URL…' },
        lookup:           { name: 'HoboLookup',         icon: 'fa-magnifying-glass',  cat: 'hub',   endpoint: '/lookup',   placeholder: 'Domain, IP, or URL — we\'ll look up everything', btnText: 'Lookup All' },
        // IP / Identity
        myip:             { name: 'HoboMyIP',           icon: 'fa-location-crosshairs', cat: 'ip',  endpoint: '/myip',     placeholder: null, auto: true },
        ip:               { name: 'HoboIP',             icon: 'fa-at',                cat: 'ip',    endpoint: '/ip',       placeholder: 'IP address or domain' },
        geoip:            { name: 'HoboGeoIP',          icon: 'fa-earth-americas',    cat: 'ip',    endpoint: '/ip',       placeholder: 'IP address or domain' },
        hostname:         { name: 'HoboHostname',       icon: 'fa-server',            cat: 'ip',    endpoint: '/rdns',     placeholder: 'IP address to resolve hostname' },
        isp:              { name: 'HoboISP',            icon: 'fa-building',          cat: 'ip',    endpoint: '/ip',       placeholder: 'IP address or domain' },
        asn:              { name: 'HoboASN',            icon: 'fa-diagram-project',   cat: 'ip',    endpoint: '/ip',       placeholder: 'IP address or domain' },
        rdns:             { name: 'HoboReverseDNS',     icon: 'fa-rotate-left',       cat: 'ip',    endpoint: '/rdns',     placeholder: 'IP address for reverse DNS' },
        whois:            { name: 'HoboWhois',          icon: 'fa-address-book',      cat: 'ip',    endpoint: '/rdap',     placeholder: 'Domain or IP' },
        rdap:             { name: 'HoboRDAP',           icon: 'fa-id-card',           cat: 'ip',    endpoint: '/rdap',     placeholder: 'Domain or IP for RDAP lookup' },
        // DNS
        dns:              { name: 'HoboDNS',            icon: 'fa-sitemap',           cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain to query' },
        dig:              { name: 'HoboDig',            icon: 'fa-terminal',          cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain (dig-style query)',   dnsTypes: true },
        nslookup:         { name: 'HoboNSLookup',       icon: 'fa-magnifying-glass-arrow-right', cat: 'dns', endpoint: '/dns', placeholder: 'Domain for nslookup' },
        dnspropagation:   { name: 'HoboDNSPropagation', icon: 'fa-globe',            cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain to check propagation' },
        mx:               { name: 'HoboMX',             icon: 'fa-envelope',          cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain for MX records',     defaultTypes: 'MX' },
        txt:              { name: 'HoboTXT',            icon: 'fa-file-lines',        cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain for TXT records',    defaultTypes: 'TXT' },
        ns:               { name: 'HoboNS',             icon: 'fa-server',            cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain for NS records',     defaultTypes: 'NS' },
        spf:              { name: 'HoboSPF',            icon: 'fa-shield-halved',     cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain for SPF check',      defaultTypes: 'TXT' },
        dkim:             { name: 'HoboDKIM',           icon: 'fa-key',               cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain for DKIM',           defaultTypes: 'TXT' },
        dmarc:            { name: 'HoboDMARC',          icon: 'fa-user-shield',       cat: 'dns',   endpoint: '/dns',      placeholder: 'Domain for DMARC',          defaultTypes: 'TXT' },
        // Active diagnostics
        ping:             { name: 'HoboPing',           icon: 'fa-satellite-dish',    cat: 'diag',  endpoint: '/ping',     placeholder: 'Host to ping' },
        traceroute:       { name: 'HoboTraceroute',     icon: 'fa-route',             cat: 'diag',  endpoint: '/ping',     placeholder: 'Host for traceroute' },
        mtr:              { name: 'HoboMTR',            icon: 'fa-chart-line',        cat: 'diag',  endpoint: '/ping',     placeholder: 'Host for MTR' },
        port:             { name: 'HoboPortCheck',      icon: 'fa-door-open',         cat: 'diag',  endpoint: '/port',     placeholder: 'Host to scan ports' },
        headers:          { name: 'HoboHeaders',        icon: 'fa-list',              cat: 'diag',  endpoint: '/headers',  placeholder: 'URL or domain' },
        redirects:        { name: 'HoboRedirects',      icon: 'fa-share',             cat: 'diag',  endpoint: '/redirects', placeholder: 'URL to follow redirects' },
        ssl:              { name: 'HoboSSL',            icon: 'fa-lock',              cat: 'diag',  endpoint: '/ssl',      placeholder: 'Domain for SSL check' },
        curl:             { name: 'HoboCurl',           icon: 'fa-download',          cat: 'diag',  endpoint: '/headers',  placeholder: 'URL' },
        httpstatus:       { name: 'HoboHTTPStatus',     icon: 'fa-circle-check',      cat: 'diag',  endpoint: '/headers',  placeholder: 'URL to check' },
        latency:          { name: 'HoboLatency',        icon: 'fa-gauge-high',        cat: 'diag',  endpoint: '/ping',     placeholder: 'Host to measure latency' },
    };

    const CATS = {
        ip: { label: 'IP / Identity / Ownership', icon: 'fa-fingerprint' },
        dns: { label: 'DNS Tools', icon: 'fa-sitemap' },
        diag: { label: 'Active Diagnostics', icon: 'fa-satellite-dish' },
    };

    // ── Detect active tool from subdomain ────────────────────
    const host = location.hostname;
    const subdomain = host.replace(/\.hobo\.tools$/, '');
    let activeTool = TOOLS[subdomain] ? subdomain : 'net';
    // Aliases
    if (subdomain === 'network') activeTool = 'net';
    if (subdomain === 'ptr') activeTool = 'rdns';
    if (subdomain === 'tls') activeTool = 'ssl';

    const tool = TOOLS[activeTool] || TOOLS.net;
    const isHub = activeTool === 'net';
    const isLookup = activeTool === 'lookup';

    // ── Set page title + meta ────────────────────────────────
    document.title = isHub ? 'HoboNet — Network & Internet Diagnostics' : `${tool.name} — ${tool.placeholder || 'Network Tool'}`;
    document.querySelector('meta[property="og:title"]').content = document.title;

    // ── Init ─────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        // Init navbar
        try {
            const token = localStorage.getItem('hobo_token') || getCookie('hobo_token');
            HoboNavbar.init({ service: 'hobonet', apiBase: 'https://hobo.tools', token });
        } catch {}

        setupUI();

        // If tool auto-runs (myip), do it immediately
        if (tool.auto) runTool();

        // Enter key
        const input = document.getElementById('search-input');
        if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') runTool(); });

        // Check for ?q= parameter
        const params = new URLSearchParams(location.search);
        const q = params.get('q') || params.get('target') || params.get('domain') || params.get('ip');
        if (q && input) { input.value = q; runTool(); }
    });

    function getCookie(name) {
        const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
        return v ? v.pop() : null;
    }

    // ── Setup UI based on active tool ────────────────────────
    function setupUI() {
        const hero = document.getElementById('hero');
        const heroIcon = hero.querySelector('.hero-icon');
        const heroH1 = hero.querySelector('h1');
        const heroSub = hero.querySelector('.sub');
        const searchInput = document.getElementById('search-input');
        const btnGo = document.getElementById('btn-go');
        const chipsArea = document.getElementById('tool-chips-area');

        // Update hero
        heroIcon.innerHTML = `<i class="fa-solid ${tool.icon}"></i>`;
        if (isHub) {
            heroH1.innerHTML = '<span class="accent">Hobo</span>Net';
            heroSub.textContent = 'Free online network diagnostics — DNS, GeoIP, ping, SSL, Whois, HTTP headers, and more. No login required.';
        } else {
            heroH1.innerHTML = tool.name.replace('Hobo', '<span class="accent">Hobo</span>');
            heroSub.textContent = tool.placeholder || '';
        }

        // Update search
        if (tool.placeholder) {
            searchInput.placeholder = tool.placeholder;
        }
        if (tool.auto) {
            document.getElementById('search-bar').style.display = 'none';
        }
        if (tool.btnText) {
            btnGo.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> ${tool.btnText}`;
        }

        // Build tool chips or tool selector
        if (isHub) {
            // Hub: show tool directory
            document.getElementById('hub-directory').style.display = '';
            buildHubDirectory();
            // Quick-pick chips
            const popular = ['lookup', 'myip', 'dns', 'ping', 'ssl', 'geoip', 'whois', 'headers', 'rdns', 'port'];
            chipsArea.innerHTML = `<div class="tool-chips">${popular.map(id => {
                const t = TOOLS[id];
                return `<span class="tool-chip" onclick="goTool('${id}')"><i class="fa-solid ${t.icon}"></i> ${t.name.replace('Hobo', '')}</span>`;
            }).join('')}</div>`;
        } else {
            // Tool page: show related tools as mini-nav
            const related = Object.entries(TOOLS).filter(([,t]) => t.cat === tool.cat && !t.auto);
            if (related.length > 1) {
                chipsArea.innerHTML = `<div class="tool-selector">${related.map(([id, t]) => {
                    const active = id === activeTool ? ' active' : '';
                    return `<button class="ts-btn${active}" onclick="goTool('${id}')"><i class="fa-solid ${t.icon}"></i> ${t.name.replace('Hobo', '')}</button>`;
                }).join('')}</div>`;
            }
        }

        // DNS type options
        if (tool.dnsTypes) {
            const types = ['A', 'AAAA', 'MX', 'TXT', 'CNAME', 'NS', 'SOA', 'PTR', 'CAA', 'SRV'];
            document.getElementById('options-area').innerHTML = `<div class="options-row">
                <label>Record types:</label>
                <select id="dns-types" multiple style="min-width:200px;min-height:28px">
                    ${types.map(t => `<option value="${t}" ${['A','AAAA','MX','TXT','NS'].includes(t) ? 'selected' : ''}>${t}</option>`).join('')}
                </select>
            </div>`;
        }
    }

    // ── Hub directory ────────────────────────────────────────
    function buildHubDirectory() {
        const dir = document.getElementById('hub-directory');
        let html = '';
        for (const [catId, cat] of Object.entries(CATS)) {
            const tools = Object.entries(TOOLS).filter(([, t]) => t.cat === catId);
            html += `<div class="cat-group">
                <h2><i class="fa-solid ${cat.icon}"></i> ${cat.label}</h2>
                <div class="tool-grid">${tools.map(([id, t]) => `
                    <a class="tool-card" href="https://${id}.hobo.tools" onclick="goTool('${id}');return false;">
                        <div class="tc-icon"><i class="fa-solid ${t.icon}"></i></div>
                        <div class="tc-info">
                            <h3>${t.name}</h3>
                            <p>${t.placeholder || ''}</p>
                            <div class="tc-domain">${id}.hobo.tools</div>
                        </div>
                    </a>
                `).join('')}</div>
            </div>`;
        }
        dir.innerHTML = html;
    }

    // ── Navigate to a tool ───────────────────────────────────
    function goTool(id) {
        const input = document.getElementById('search-input');
        const q = input ? input.value.trim() : '';
        const url = `https://${id}.hobo.tools${q ? '?q=' + encodeURIComponent(q) : ''}`;
        location.href = url;
    }

    // ── Run the active tool ──────────────────────────────────
    async function runTool() {
        const input = document.getElementById('search-input');
        const target = input ? input.value.trim() : '';
        const resultsEl = document.getElementById('results');

        // Hub: if user types something, redirect to lookup
        if (isHub && target) {
            location.href = `https://lookup.hobo.tools?q=${encodeURIComponent(target)}`;
            return;
        }

        if (!tool.endpoint) return;
        if (!target && !tool.auto) { toast('Please enter a domain, IP, or URL', 'error'); return; }

        // Show loading
        resultsEl.innerHTML = `<div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Running ${tool.name}…</p></div>`;

        try {
            let url = `${API_BASE}${tool.endpoint}`;
            const params = new URLSearchParams();
            if (target) params.set('target', target);

            // DNS type overrides
            if (tool.defaultTypes) params.set('types', tool.defaultTypes);
            if (tool.dnsTypes) {
                const sel = document.getElementById('dns-types');
                if (sel) {
                    const selected = [...sel.selectedOptions].map(o => o.value);
                    if (selected.length) params.set('types', selected.join(','));
                }
            }
            // DKIM special: query selector._domainkey.domain
            if (activeTool === 'dkim' && target) {
                const selector = prompt('DKIM selector (e.g., "default", "google", "s1"):', 'default') || 'default';
                params.set('target', `${selector}._domainkey.${target}`);
            }
            // DMARC: prepend _dmarc.
            if (activeTool === 'dmarc' && target) {
                params.set('target', `_dmarc.${target}`);
            }
            // SPF: just TXT
            if (activeTool === 'spf') params.set('types', 'TXT');

            const qs = params.toString();
            if (qs) url += (url.includes('?') ? '&' : '?') + qs;

            const token = localStorage.getItem('hobo_token') || getCookie('hobo_token');
            const headers = {};
            if (token) headers['Authorization'] = `Bearer ${token}`;

            const r = await fetch(url, { headers });
            const data = await r.json();

            if (!data.ok) throw new Error(data.error || 'Lookup failed');

            renderResults(data);
        } catch (err) {
            resultsEl.innerHTML = `<div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> ${esc(err.message)}</div>`;
        }
    }

    // ── Render results based on tool type ────────────────────
    function renderResults(data) {
        const el = document.getElementById('results');

        // Route to specialized renderers
        if (activeTool === 'myip') return renderMyIP(el, data);
        if (activeTool === 'lookup' || isLookup) return renderLookup(el, data);
        if (tool.endpoint === '/ip') return renderIP(el, data);
        if (tool.endpoint === '/dns') return renderDNS(el, data);
        if (tool.endpoint === '/rdns') return renderRDNS(el, data);
        if (tool.endpoint === '/rdap') return renderRDAP(el, data);
        if (tool.endpoint === '/ssl') return renderSSL(el, data);
        if (tool.endpoint === '/headers') return renderHeaders(el, data);
        if (tool.endpoint === '/redirects') return renderRedirects(el, data);
        if (tool.endpoint === '/port') return renderPort(el, data);
        if (tool.endpoint === '/ping') return renderPing(el, data);

        // Fallback: raw JSON
        el.innerHTML = `<div class="card"><div class="raw-block">${esc(JSON.stringify(data, null, 2))}</div></div>`;
    }

    // ── Renderers ────────────────────────────────────────────

    function renderMyIP(el, data) {
        el.innerHTML = `<div class="myip-card">
            <div style="font-size:13px;color:var(--text-muted)">Your Public IP Address</div>
            <div class="ip-display">${esc(data.ip)}</div>
            <button class="copy-btn" onclick="copyText('${esc(data.ip)}')"><i class="fa-solid fa-copy"></i> Copy</button>
            <div style="margin-top:12px">
                <span class="pivot" onclick="goLookup('${esc(data.ip)}')"><i class="fa-solid fa-magnifying-glass"></i> Full lookup</span>
                &nbsp;
                <span class="pivot" onclick="goToolWithTarget('geoip','${esc(data.ip)}')"><i class="fa-solid fa-earth-americas"></i> GeoIP</span>
                &nbsp;
                <span class="pivot" onclick="goToolWithTarget('rdns','${esc(data.ip)}')"><i class="fa-solid fa-rotate-left"></i> Reverse DNS</span>
            </div>
        </div>`;
        // Also fetch full IP info
        fetchAndAppendIPInfo(el, data.ip);
    }

    async function fetchAndAppendIPInfo(el, ip) {
        try {
            const token = localStorage.getItem('hobo_token') || getCookie('hobo_token');
            const headers = {};
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const r = await fetch(`${API_BASE}/ip?target=${encodeURIComponent(ip)}`, { headers });
            const data = await r.json();
            if (data.ok) {
                el.innerHTML += renderIPCard(data);
            }
        } catch {}
    }

    function renderIP(el, data) {
        el.innerHTML = renderIPCard(data);
    }

    function renderIPCard(data) {
        const geo = data.geo || {};
        const net = data.network || {};
        return `
            <div class="badges">
                ${geo.city ? `<span class="badge badge-cyan">📍 ${esc(geo.city)}, ${esc(geo.country)}</span>` : ''}
                ${net.isp ? `<span class="badge badge-blue">🏢 ${esc(net.isp)}</span>` : ''}
                ${net.as ? `<span class="badge">🔗 ${esc(net.as)}</span>` : ''}
                ${data.reverse ? `<span class="badge">🔄 ${esc(data.reverse)}</span>` : ''}
            </div>
            <div class="card">
                <div class="card-head"><i class="fa-solid fa-earth-americas"></i> GeoIP & Network</div>
                <table class="res-table">
                    <tr><td class="key">IP</td><td class="val">${esc(data.ip)}</td></tr>
                    ${data.hostname ? `<tr><td class="key">Hostname</td><td class="val">${esc(data.hostname)}</td></tr>` : ''}
                    <tr><td class="key">Country</td><td class="val">${esc(geo.country || '—')} (${esc(geo.countryCode || '')})</td></tr>
                    <tr><td class="key">Region</td><td class="val">${esc(geo.region || '—')}</td></tr>
                    <tr><td class="key">City</td><td class="val">${esc(geo.city || '—')}</td></tr>
                    <tr><td class="key">Timezone</td><td class="val">${esc(geo.timezone || '—')}</td></tr>
                    <tr><td class="key">Coordinates</td><td class="val">${geo.lat != null ? `${geo.lat}, ${geo.lon}` : '—'}</td></tr>
                    <tr><td class="key">ISP</td><td class="val">${esc(net.isp || '—')}</td></tr>
                    <tr><td class="key">Organization</td><td class="val">${esc(net.org || '—')}</td></tr>
                    <tr><td class="key">AS</td><td class="val">${esc(net.as || '—')}</td></tr>
                    <tr><td class="key">AS Name</td><td class="val">${esc(net.asname || '—')}</td></tr>
                    ${data.reverse ? `<tr><td class="key">Reverse DNS</td><td class="val">${esc(data.reverse)}</td></tr>` : ''}
                </table>
            </div>
            <div style="text-align:center;margin-top:8px">
                <span class="pivot" onclick="goLookup('${esc(data.ip)}')"><i class="fa-solid fa-magnifying-glass"></i> Full lookup</span>
                &nbsp;
                <span class="pivot" onclick="goToolWithTarget('rdns','${esc(data.ip)}')"><i class="fa-solid fa-rotate-left"></i> Reverse DNS</span>
                &nbsp;
                <span class="pivot" onclick="goToolWithTarget('whois','${esc(data.ip)}')"><i class="fa-solid fa-address-book"></i> Whois</span>
            </div>`;
    }

    function renderDNS(el, data) {
        const records = data.records || {};
        let html = `<div class="badges"><span class="badge badge-cyan">🔍 ${esc(data.target)}</span><span class="badge">📡 Server: ${esc(data.server)}</span></div>`;
        for (const [type, recs] of Object.entries(records)) {
            if (recs.error) {
                html += `<div class="card"><div class="card-head"><i class="fa-solid fa-sitemap"></i> ${type}</div><p style="color:var(--text-muted);font-size:13px">No ${type} records (${recs.error})</p></div>`;
                continue;
            }
            html += `<div class="card"><div class="card-head"><i class="fa-solid fa-sitemap"></i> ${type} Records</div>`;
            if (Array.isArray(recs) && recs.length > 0) {
                if (type === 'MX') {
                    html += `<table class="res-table"><tr><th>Priority</th><th>Exchange</th></tr>${recs.map(r => `<tr><td class="val">${r.priority}</td><td class="val">${esc(typeof r === 'object' ? r.exchange : r)}</td></tr>`).join('')}</table>`;
                } else if (type === 'SOA') {
                    const soa = recs;
                    html += `<table class="res-table">
                        <tr><td class="key">Primary NS</td><td class="val">${esc(soa.nsname || soa[0]?.nsname || '—')}</td></tr>
                        <tr><td class="key">Hostmaster</td><td class="val">${esc(soa.hostmaster || soa[0]?.hostmaster || '—')}</td></tr>
                        <tr><td class="key">Serial</td><td class="val">${soa.serial || soa[0]?.serial || '—'}</td></tr>
                        <tr><td class="key">Refresh</td><td class="val">${soa.refresh || soa[0]?.refresh || '—'}s</td></tr>
                        <tr><td class="key">Retry</td><td class="val">${soa.retry || soa[0]?.retry || '—'}s</td></tr>
                        <tr><td class="key">Expire</td><td class="val">${soa.expire || soa[0]?.expire || '—'}s</td></tr>
                        <tr><td class="key">Min TTL</td><td class="val">${soa.minttl || soa[0]?.minttl || '—'}s</td></tr>
                    </table>`;
                } else if (type === 'TXT') {
                    html += `<div style="display:flex;flex-direction:column;gap:6px">${recs.map(r => {
                        const txt = Array.isArray(r) ? r.join('') : (typeof r === 'object' ? (r.data || JSON.stringify(r)) : r);
                        const isSPF = txt.startsWith('v=spf1');
                        const isDMARC = txt.startsWith('v=DMARC1');
                        const isDKIM = txt.startsWith('v=DKIM1');
                        const label = isSPF ? '🛡️ SPF' : isDMARC ? '🛡️ DMARC' : isDKIM ? '🔑 DKIM' : '';
                        return `<div class="raw-block">${label ? `<strong>${label}</strong> ` : ''}${esc(txt)}</div>`;
                    }).join('')}</div>`;
                } else {
                    html += `<table class="res-table"><tr><th>Value</th></tr>${recs.map(r => {
                        const val = typeof r === 'object' ? (r.data || JSON.stringify(r)) : r;
                        return `<tr><td class="val">${esc(String(val))}</td></tr>`;
                    }).join('')}</table>`;
                }
            } else {
                html += `<p style="color:var(--text-muted);font-size:13px">No records found</p>`;
            }
            html += `</div>`;
        }

        // Pivot links
        html += `<div style="text-align:center;margin-top:8px">
            <span class="pivot" onclick="goLookup('${esc(data.target)}')"><i class="fa-solid fa-magnifying-glass"></i> Full lookup</span>
            &nbsp;
            <span class="pivot" onclick="goToolWithTarget('ssl','${esc(data.target)}')"><i class="fa-solid fa-lock"></i> SSL</span>
            &nbsp;
            <span class="pivot" onclick="goToolWithTarget('whois','${esc(data.target)}')"><i class="fa-solid fa-address-book"></i> Whois</span>
        </div>`;

        el.innerHTML = html;
    }

    function renderRDNS(el, data) {
        el.innerHTML = `<div class="card">
            <div class="card-head"><i class="fa-solid fa-rotate-left"></i> Reverse DNS</div>
            <table class="res-table">
                <tr><td class="key">IP</td><td class="val">${esc(data.ip)}</td></tr>
                <tr><td class="key">PTR / Hostname</td><td class="val">${data.hostnames?.length ? data.hostnames.map(h => esc(h)).join('<br>') : '<span style="color:var(--text-muted)">No PTR record</span>'}</td></tr>
            </table>
        </div>`;
    }

    function renderRDAP(el, data) {
        const s = data.summary || {};
        let html = `<div class="badges">
            <span class="badge badge-cyan">${esc(data.target)}</span>
            <span class="badge">${esc(data.type)}</span>
            ${(s.status || []).map(st => `<span class="badge ${st.includes('active') ? 'badge-green' : ''}">${esc(st)}</span>`).join('')}
        </div>`;
        html += `<div class="card"><div class="card-head"><i class="fa-solid fa-id-card"></i> Registration Data (RDAP)</div>
            <table class="res-table">
                <tr><td class="key">Name</td><td class="val">${esc(s.name || data.target)}</td></tr>
                <tr><td class="key">Handle</td><td class="val">${esc(s.handle || '—')}</td></tr>
                ${(s.events || []).map(e => `<tr><td class="key">${esc(e.action)}</td><td class="val">${esc(e.date)}</td></tr>`).join('')}
                ${s.nameservers?.length ? `<tr><td class="key">Nameservers</td><td class="val">${s.nameservers.map(n => esc(n)).join('<br>')}</td></tr>` : ''}
                ${s.port43 ? `<tr><td class="key">Whois Server</td><td class="val">${esc(s.port43)}</td></tr>` : ''}
            </table>
        </div>`;
        if (s.entities?.length) {
            html += `<div class="card"><div class="card-head"><i class="fa-solid fa-users"></i> Entities</div>
                <table class="res-table"><tr><th>Handle</th><th>Roles</th><th>Name</th></tr>
                ${s.entities.map(e => `<tr><td class="val">${esc(e.handle || '—')}</td><td>${(e.roles||[]).join(', ')}</td><td>${esc(e.name || '—')}</td></tr>`).join('')}
                </table></div>`;
        }
        // Raw toggle
        html += `<details style="margin-top:12px"><summary style="cursor:pointer;color:var(--text-muted);font-size:13px">Raw RDAP response</summary>
            <div class="raw-block" style="margin-top:8px">${esc(JSON.stringify(data.raw, null, 2))}</div></details>`;
        el.innerHTML = html;
    }

    function renderSSL(el, data) {
        const c = data.certificate || {};
        const statusClass = c.isExpired ? 'badge-red' : c.isExpiringSoon ? 'badge-yellow' : 'badge-green';
        const statusText = c.isExpired ? '🔴 EXPIRED' : c.isExpiringSoon ? `🟡 Expires in ${c.daysLeft}d` : `🟢 Valid (${c.daysLeft}d left)`;
        let html = `<div class="badges">
            <span class="badge ${statusClass}">${statusText}</span>
            <span class="badge badge-cyan">${esc(data.protocol || '')}</span>
            ${data.cipher ? `<span class="badge">${esc(data.cipher.name)}</span>` : ''}
        </div>`;
        html += `<div class="card"><div class="card-head"><i class="fa-solid fa-lock"></i> SSL Certificate</div>
            <table class="res-table">
                <tr><td class="key">Subject</td><td class="val">${esc(c.subject?.CN || '—')}</td></tr>
                <tr><td class="key">Issuer</td><td class="val">${esc(c.issuer?.CN || c.issuer?.O || '—')}</td></tr>
                <tr><td class="key">Serial</td><td class="val" style="font-size:11px">${esc(c.serialNumber || '—')}</td></tr>
                <tr><td class="key">Valid From</td><td class="val">${esc(c.validFrom || '—')}</td></tr>
                <tr><td class="key">Valid To</td><td class="val">${esc(c.validTo || '—')}</td></tr>
                <tr><td class="key">Days Left</td><td class="val ${c.isExpired ? 'style="color:var(--red)"' : ''}">${c.daysLeft}</td></tr>
                <tr><td class="key">SANs</td><td class="val">${c.sans?.length ? c.sans.map(s => esc(s)).join(', ') : '—'}</td></tr>
                <tr><td class="key">Fingerprint</td><td class="val" style="font-size:10px">${esc(c.fingerprint || '—')}</td></tr>
            </table>
        </div>`;
        if (data.chain?.length) {
            html += `<div class="card"><div class="card-head"><i class="fa-solid fa-link"></i> Certificate Chain</div>
                <table class="res-table"><tr><th>Subject</th><th>Issuer</th><th>Valid To</th></tr>
                ${data.chain.map(c => `<tr><td class="val">${esc(c.subject)}</td><td>${esc(c.issuer)}</td><td>${esc(c.validTo)}</td></tr>`).join('')}
                </table></div>`;
        }
        el.innerHTML = html;
    }

    function renderHeaders(el, data) {
        const h = data.headers || {};
        let html = `<div class="badges">
            <span class="badge ${data.status < 400 ? 'badge-green' : 'badge-red'}">HTTP ${data.status} ${esc(data.statusText || '')}</span>
            ${data.server ? `<span class="badge">Server: ${esc(data.server)}</span>` : ''}
            ${data.timing ? `<span class="badge badge-cyan">⚡ ${data.timing.ms}ms</span>` : ''}
            <span class="badge">Security: ${data.securityScore || '?/6'}</span>
        </div>`;
        // Security analysis
        const sec = data.security || {};
        html += `<div class="card"><div class="card-head"><i class="fa-solid fa-shield-halved"></i> Security Headers</div>
            <table class="res-table">
                <tr><td class="key">HSTS</td><td class="val">${sec.hasHSTS ? '✅ Present' : '❌ Missing'}</td></tr>
                <tr><td class="key">CSP</td><td class="val">${sec.hasCSP ? '✅ Present' : '❌ Missing'}</td></tr>
                <tr><td class="key">X-Content-Type-Options</td><td class="val">${sec.hasXCTO ? '✅ nosniff' : '❌ Missing'}</td></tr>
                <tr><td class="key">X-Frame-Options</td><td class="val">${sec.hasXFO ? '✅ Present' : '❌ Missing'}</td></tr>
                <tr><td class="key">Referrer-Policy</td><td class="val">${sec.hasRP ? '✅ Present' : '❌ Missing'}</td></tr>
                <tr><td class="key">Permissions-Policy</td><td class="val">${sec.hasPermissions ? '✅ Present' : '❌ Missing'}</td></tr>
            </table>
        </div>`;
        // All headers
        html += `<div class="card"><div class="card-head"><i class="fa-solid fa-list"></i> Response Headers</div>
            <table class="res-table">${Object.entries(h).map(([k, v]) => `<tr><td class="key">${esc(k)}</td><td class="val">${esc(v)}</td></tr>`).join('')}</table>
        </div>`;
        el.innerHTML = html;
    }

    function renderRedirects(el, data) {
        const chain = data.chain || [];
        let html = `<div class="badges">
            <span class="badge badge-cyan">${chain.length} hop${chain.length !== 1 ? 's' : ''}</span>
            <span class="badge badge-green">Final: ${esc(data.finalUrl || '')}</span>
        </div>`;
        html += `<div class="card"><div class="card-head"><i class="fa-solid fa-share"></i> Redirect Chain</div>
            <table class="res-table"><tr><th>#</th><th>URL</th><th>Status</th><th>Time</th></tr>
            ${chain.map((h, i) => `<tr>
                <td class="val">${i + 1}</td>
                <td class="val" style="max-width:400px;overflow:hidden;text-overflow:ellipsis">${esc(h.url)}</td>
                <td><span class="badge ${h.status < 400 ? (h.status >= 300 ? 'badge-yellow' : 'badge-green') : 'badge-red'}">${h.status}</span></td>
                <td class="val">${h.ms}ms</td>
            </tr>`).join('')}
            </table></div>`;
        el.innerHTML = html;
    }

    function renderPort(el, data) {
        const ports = data.ports || [];
        let html = `<div class="badges">
            <span class="badge badge-cyan">${esc(data.target)} (${esc(data.ip)})</span>
            <span class="badge badge-green">${ports.filter(p => p.status === 'open').length} open</span>
            <span class="badge badge-red">${ports.filter(p => p.status !== 'open').length} closed/filtered</span>
        </div>`;
        html += `<div class="card"><div class="card-head"><i class="fa-solid fa-door-open"></i> Port Scan Results</div>
            <table class="res-table"><tr><th>Port</th><th>Status</th><th>Latency</th></tr>
            ${ports.map(p => `<tr>
                <td class="val">${p.port}</td>
                <td><span class="badge ${p.status === 'open' ? 'badge-green' : p.status === 'filtered' ? 'badge-yellow' : 'badge-red'}">${p.status}</span></td>
                <td class="val">${p.ms}ms</td>
            </tr>`).join('')}
            </table></div>`;
        el.innerHTML = html;
    }

    function renderPing(el, data) {
        const results = data.results || [];
        const stats = data.stats || {};
        let html = `<div class="badges">
            <span class="badge badge-cyan">${esc(data.target)} (${esc(data.ip)})</span>
            <span class="badge badge-green">Avg: ${stats.avg}ms</span>
            <span class="badge">Min: ${stats.min}ms / Max: ${stats.max}ms</span>
            <span class="badge ${stats.loss > 0 ? 'badge-red' : 'badge-green'}">Loss: ${stats.loss}%</span>
        </div>`;
        html += `<div class="card"><div class="card-head"><i class="fa-solid fa-satellite-dish"></i> Ping Results (TCP)</div>
            <table class="res-table"><tr><th>Seq</th><th>Status</th><th>Time</th></tr>
            ${results.map(r => `<tr>
                <td class="val">${r.seq}</td>
                <td><span class="badge ${r.status === 'ok' ? 'badge-green' : 'badge-red'}">${r.status}</span></td>
                <td class="val">${r.ms}ms</td>
            </tr>`).join('')}
            </table>
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
                <table class="res-table">
                    <tr><td class="key">Min</td><td class="val">${stats.min}ms</td><td class="key">Max</td><td class="val">${stats.max}ms</td></tr>
                    <tr><td class="key">Avg</td><td class="val">${stats.avg}ms</td><td class="key">Loss</td><td class="val">${stats.loss}%</td></tr>
                </table>
            </div>
        </div>`;
        el.innerHTML = html;
    }

    function renderLookup(el, data) {
        // Supertool: tabbed view
        const sections = [];
        if (data.ip) sections.push({ id: 'ip', label: 'IP / Geo', icon: 'fa-earth-americas' });
        if (data.dns) sections.push({ id: 'dns', label: 'DNS', icon: 'fa-sitemap' });
        if (data.rdap) sections.push({ id: 'rdap', label: 'RDAP / Whois', icon: 'fa-id-card' });
        if (data.ssl) sections.push({ id: 'ssl', label: 'SSL', icon: 'fa-lock' });
        if (data.headers) sections.push({ id: 'headers', label: 'Headers', icon: 'fa-list' });
        if (data.reverseDns) sections.push({ id: 'rdns', label: 'Reverse DNS', icon: 'fa-rotate-left' });

        // Badges
        let html = `<div class="badges">${(data.badges || []).map(b => `<span class="badge badge-cyan">${esc(b)}</span>`).join('')}</div>`;

        // Tabs
        html += `<div class="tabs">${sections.map((s, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchTab('${s.id}', this)"><i class="fa-solid ${s.icon}"></i> ${s.label}</button>`).join('')}</div>`;

        // Tab contents
        if (data.ip) {
            const ip = data.ip;
            html += `<div class="tab-content ${sections[0]?.id === 'ip' ? 'active' : ''}" id="tab-ip">
                <div class="card"><div class="card-head"><i class="fa-solid fa-earth-americas"></i> IP / Geolocation</div>
                <table class="res-table">
                    <tr><td class="key">IP</td><td class="val">${esc(ip.address || '—')}</td></tr>
                    <tr><td class="key">Country</td><td class="val">${esc(ip.country || '—')} (${esc(ip.countryCode || '')})</td></tr>
                    <tr><td class="key">Region</td><td class="val">${esc(ip.region || '—')}</td></tr>
                    <tr><td class="key">City</td><td class="val">${esc(ip.city || '—')}</td></tr>
                    <tr><td class="key">Timezone</td><td class="val">${esc(ip.timezone || '—')}</td></tr>
                    <tr><td class="key">Coordinates</td><td class="val">${ip.lat != null ? `${ip.lat}, ${ip.lon}` : '—'}</td></tr>
                    <tr><td class="key">ISP</td><td class="val">${esc(ip.isp || '—')}</td></tr>
                    <tr><td class="key">Organization</td><td class="val">${esc(ip.org || '—')}</td></tr>
                    <tr><td class="key">AS</td><td class="val">${esc(ip.as || '—')}</td></tr>
                    <tr><td class="key">AS Name</td><td class="val">${esc(ip.asname || '—')}</td></tr>
                </table></div></div>`;
        }
        if (data.dns) {
            html += `<div class="tab-content" id="tab-dns">`;
            for (const [type, recs] of Object.entries(data.dns)) {
                if (!recs?.length) continue;
                html += `<div class="card"><div class="card-head"><i class="fa-solid fa-sitemap"></i> ${type}</div>`;
                if (type === 'MX') {
                    html += `<table class="res-table"><tr><th>Priority</th><th>Exchange</th></tr>${recs.map(r => `<tr><td class="val">${r.priority}</td><td class="val">${esc(r.exchange)}</td></tr>`).join('')}</table>`;
                } else if (type === 'TXT') {
                    html += `<div style="display:flex;flex-direction:column;gap:6px">${recs.map(r => `<div class="raw-block">${esc(Array.isArray(r) ? r.join('') : r)}</div>`).join('')}</div>`;
                } else {
                    html += `<div class="raw-block">${recs.map(r => esc(typeof r === 'object' ? JSON.stringify(r) : r)).join('\n')}</div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }
        if (data.rdap) {
            const r = data.rdap;
            html += `<div class="tab-content" id="tab-rdap"><div class="card"><div class="card-head"><i class="fa-solid fa-id-card"></i> RDAP / Whois</div>
                <table class="res-table">
                    <tr><td class="key">Name</td><td class="val">${esc(r.name || '—')}</td></tr>
                    ${(r.status || []).map(s => `<tr><td class="key">Status</td><td class="val">${esc(s)}</td></tr>`).join('')}
                    ${(r.events || []).map(e => `<tr><td class="key">${esc(e.action)}</td><td class="val">${esc(e.date)}</td></tr>`).join('')}
                    ${r.nameservers?.length ? `<tr><td class="key">Nameservers</td><td class="val">${r.nameservers.map(n => esc(n)).join('<br>')}</td></tr>` : ''}
                </table></div></div>`;
        }
        if (data.ssl) {
            const s = data.ssl;
            html += `<div class="tab-content" id="tab-ssl"><div class="card"><div class="card-head"><i class="fa-solid fa-lock"></i> SSL Certificate</div>
                <table class="res-table">
                    <tr><td class="key">Subject</td><td class="val">${esc(s.subject || '—')}</td></tr>
                    <tr><td class="key">Issuer</td><td class="val">${esc(s.issuer || '—')}</td></tr>
                    <tr><td class="key">Valid From</td><td class="val">${esc(s.validFrom || '—')}</td></tr>
                    <tr><td class="key">Valid To</td><td class="val">${esc(s.validTo || '—')}</td></tr>
                    <tr><td class="key">Days Left</td><td class="val">${s.daysLeft}</td></tr>
                    <tr><td class="key">Protocol</td><td class="val">${esc(s.protocol || '—')}</td></tr>
                    <tr><td class="key">SANs</td><td class="val">${s.sans?.length ? s.sans.map(x => esc(x)).join(', ') : '—'}</td></tr>
                </table></div></div>`;
        }
        if (data.headers) {
            const h = data.headers;
            html += `<div class="tab-content" id="tab-headers"><div class="card"><div class="card-head"><i class="fa-solid fa-list"></i> HTTP Response</div>
                <table class="res-table">
                    <tr><td class="key">Status</td><td class="val">${h.status} — ${h.ms}ms</td></tr>
                    ${h.server ? `<tr><td class="key">Server</td><td class="val">${esc(h.server)}</td></tr>` : ''}
                    ${Object.entries(h.headers || {}).map(([k, v]) => `<tr><td class="key">${esc(k)}</td><td class="val">${esc(v)}</td></tr>`).join('')}
                </table></div></div>`;
        }
        if (data.reverseDns) {
            const r = data.reverseDns;
            html += `<div class="tab-content" id="tab-rdns"><div class="card"><div class="card-head"><i class="fa-solid fa-rotate-left"></i> Reverse DNS</div>
                <table class="res-table">
                    <tr><td class="key">IP</td><td class="val">${esc(r.ip || '—')}</td></tr>
                    <tr><td class="key">Hostnames</td><td class="val">${r.hostnames?.length ? r.hostnames.map(h => esc(h)).join('<br>') : 'No PTR record'}</td></tr>
                </table></div></div>`;
        }

        el.innerHTML = html;
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const tab = document.getElementById(`tab-${id}`);
        if (tab) tab.classList.add('active');
    }

    // ── Utility functions ────────────────────────────────────
    function esc(s) {
        if (s == null) return '';
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => toast('Copied!', 'info')).catch(() => {});
    }

    function goLookup(target) {
        location.href = `https://lookup.hobo.tools?q=${encodeURIComponent(target)}`;
    }

    function goToolWithTarget(toolId, target) {
        location.href = `https://${toolId}.hobo.tools?q=${encodeURIComponent(target)}`;
    }

    function toast(msg, type = 'info') {
        const container = document.getElementById('toasts');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        container.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }
    </script>
</body>
</html>
