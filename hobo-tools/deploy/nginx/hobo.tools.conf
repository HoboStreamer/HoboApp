# ═══════════════════════════════════════════════════════════════
# hobo.tools + *.hobo.tools — Nginx Configuration
# Proxy to hobo-tools Node.js server on port 3100
# Cloudflare handles TLS; this listens on port 80 only.
# ═══════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=hobotools_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=hobotools_auth:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name hobo.tools *.hobo.tools;

    client_max_body_size 5m;

    # ── Auth endpoints (strict rate limit) ──────────────────
    location ~ ^/(api/auth/(register|login|anon-session)|token|authorize) {
        limit_req zone=hobotools_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Shared static assets (long cache) ───────────────────
    location /shared/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── API (moderate rate limit) ───────────────────────────
    location /api/ {
        limit_req zone=hobotools_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Internal API (localhost only) ───────────────────────
    location /internal/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static / SPA ────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
