# ═══════════════════════════════════════════════════════════════
# hobo.tools + *.hobo.tools — Nginx Configuration (REFERENCE)
#
# NOTE: This file is now a REFERENCE template.
# Production configs are generated and applied automatically
# via the hobo.tools admin panel (Deploy → Nginx).
#
# The deploy system generates configs from the URL registry
# and service map, writes them with backup/rollback safety,
# validates with `nginx -t`, and reloads on apply.
#
# To use the automated system:
#   1. Go to hobo.tools/admin → Deploy tab
#   2. Configure domains and certificate mode
#   3. Preview, then Apply & Reload
#
# Proxy to hobo-tools Node.js server on port 3100
# Let's Encrypt wildcard TLS + Cloudflare proxy
# ═══════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=hobotools_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=hobotools_auth:10m rate=5r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hobo.tools *.hobo.tools;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hobo.tools *.hobo.tools;

    ssl_certificate     /etc/letsencrypt/live/hobo.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hobo.tools/privkey.pem;

    access_log /var/log/nginx/hobo.tools.access.log;
    error_log  /var/log/nginx/hobo.tools.error.log;

    client_max_body_size 5m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Auth endpoints (strict rate limit) ──────────────────
    location ~ ^/(api/auth/(register|login|anon-session)|oauth/(token|authorize)) {
        limit_req zone=hobotools_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Shared static assets (long cache) ───────────────────
    location /shared/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── API (moderate rate limit) ───────────────────────────
    location /api/ {
        limit_req zone=hobotools_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Internal API (localhost only) ───────────────────────
    location /internal/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static / SPA ────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
