<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordmark Generator | wordmark.hobo.tools</title>
    <meta name="description" content="Create clean text-only wordmark logos with 46 Google Fonts, custom weight, spacing, and color.">
    <meta name="theme-color" content="#0b0c12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/shared.css">
    <script src="https://hobo.tools/shared/theme-loader.js"></script>
    <style>
        .wordmark-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .wm-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all .2s; }
        .wm-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .wm-preview { padding: 2rem 1.5rem; display: flex; align-items: center; justify-content: center; min-height: 100px; background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%); background-size: 12px 12px; background-position: 0 0, 0 6px, 6px -6px, -6px 0; }
        .wm-preview canvas { max-width: 100%; height: auto; }
        .wm-info { padding: .75rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .wm-info .font-name { font-size: .85rem; color: var(--text-secondary); }
        .wm-info .btn { padding: .35rem .75rem; font-size: .75rem; }
        .controls-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: end; }
        .controls-bar .ctrl { display: flex; flex-direction: column; gap: .35rem; }
        .controls-bar label { font-size: .8rem; color: var(--text-secondary); }
        .controls-bar input[type="color"] { width: 40px; height: 34px; border: 1px solid var(--border); background: var(--bg-secondary); border-radius: 8px; cursor: pointer; padding: 2px; }
        @media (max-width: 600px) { .wordmark-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="tool-wrap" style="max-width: 1100px;">
        <div class="page-header">
            <h1><i class="fas fa-font"></i> Wordmark Generator</h1>
            <p class="subtitle">See your brand name in 46 curated fonts. Click any to download as transparent PNG.</p>
        </div>

        <div class="controls-bar">
            <div class="ctrl" style="flex: 1; min-width: 180px;">
                <label>Brand Name</label>
                <input type="text" id="text" value="hobo tools" placeholder="Enter your brand name...">
            </div>
            <div class="ctrl">
                <label>Color</label>
                <input type="color" id="color" value="#ffffff">
            </div>
            <div class="ctrl">
                <label>Size</label>
                <select id="fontSize">
                    <option value="36">Small (36px)</option>
                    <option value="48">Medium (48px)</option>
                    <option value="64" selected>Large (64px)</option>
                    <option value="96">XL (96px)</option>
                </select>
            </div>
            <div class="ctrl">
                <label>Weight</label>
                <select id="fontWeight">
                    <option value="400">Regular</option>
                    <option value="700" selected>Bold</option>
                    <option value="900">Black</option>
                </select>
            </div>
        </div>

        <div class="wordmark-grid" id="grid"></div>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="https://logo.hobo.tools">Logo Hub</a>
                <a href="https://title.hobo.tools">Title Cards</a>
                <a href="https://badge.hobo.tools">Badge Maker</a>
                <a href="https://text.hobo.tools">HoboText</a>
            </div>
            <p>&copy; 2025 Hobo Network</p>
        </footer>
    </div>

    <script src="https://hobo.tools/shared/navbar.js"></script>
    <script src="https://hobo.tools/shared/notification-ui.js"></script>
    <script src="https://hobo.tools/shared/account-switcher.js"></script>
    <script src="/js/logo-engine.js"></script>
    <script src="/js/shared.js"></script>
    <script>
        HoboUI.initPage();
        const E = HoboLogoEngine;
        const grid = document.getElementById('grid');

        function getOpts(font) {
            return {
                font,
                fontSize: +document.getElementById('fontSize').value,
                fontWeight: document.getElementById('fontWeight').value,
                color: document.getElementById('color').value,
                bg: 'transparent',
                padding: 24,
            };
        }

        async function renderAll() {
            const text = document.getElementById('text').value || 'hobo tools';
            grid.innerHTML = '';
            for (const font of E.fonts) {
                const card = document.createElement('div');
                card.className = 'wm-card';
                const preview = document.createElement('div');
                preview.className = 'wm-preview';
                const cvs = document.createElement('canvas');
                preview.appendChild(cvs);
                const info = document.createElement('div');
                info.className = 'wm-info';
                info.innerHTML = `<span class="font-name">${font}</span><button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); dlFont('${font}')"><i class="fas fa-download"></i> PNG</button>`;
                card.appendChild(preview);
                card.appendChild(info);
                card.onclick = () => dlFont(font);
                grid.appendChild(card);

                // Render async (don't block)
                E.render(cvs, text, getOpts(font));
            }
        }

        window.dlFont = async function(font) {
            const cvs = document.createElement('canvas');
            const text = document.getElementById('text').value || 'hobo tools';
            await E.render(cvs, text, { ...getOpts(font), fontSize: 128, padding: 60 });
            const slug = text.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase().slice(0, 30);
            E.download(cvs, `${slug}-${font.replace(/\s+/g, '-').toLowerCase()}.png`, 'png');
        };

        let debounce;
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(renderAll, 300); });
        });

        renderAll();
    </script>
</body>
</html>
