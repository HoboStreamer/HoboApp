<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Text Generator — Circled & Squared Letters | bubble.hobo.tools</title>
    <meta name="description" content="Convert text into circled, negative circled, squared, negative squared, and regional indicator Unicode letters.">
    <meta name="theme-color" content="#0b0c12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/shared.css">
    <script src="https://hobo.tools/shared/theme-loader.js"></script>
</head>
<body>
    <div class="tool-wrap">
        <div class="page-header">
            <h1><i class="fas fa-circle"></i> Bubble Text</h1>
            <p class="subtitle">Transform text into enclosed Unicode letters — circled, squared, and regional indicators.</p>
        </div>

        <div class="tool-section">
            <div class="input-group">
                <textarea id="input" class="large" placeholder="Type your text here..." autofocus>Hello World</textarea>
            </div>
        </div>

        <div id="output" class="output-grid"></div>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="https://text.hobo.tools">HoboText Hub</a>
                <a href="https://fancy.hobo.tools">Fancy Text</a>
                <a href="https://symbols.hobo.tools">Symbols</a>
            </div>
            <p>&copy; 2025 Hobo Network</p>
        </footer>
    </div>

    <script src="https://hobo.tools/shared/navbar.js"></script>
    <script src="https://hobo.tools/shared/notification-ui.js"></script>
    <script src="https://hobo.tools/shared/account-switcher.js"></script>
    <script src="/js/text-engine.js"></script>
    <script src="/js/shared.js"></script>
    <script>
        HoboUI.initPage();
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const bubbleStyles = ['circled','squared','negSquared','parenthesized','regional'];
        const cards = {};

        function updateAll() {
            const text = input.value || '';
            if (!text.trim()) {
                output.innerHTML = '<div style="color: var(--text-muted); text-align: center; grid-column: 1/-1; padding: 40px;">Type text above to see bubble styles...</div>';
                return;
            }
            if (Object.keys(cards).length === 0) {
                output.innerHTML = '';
                bubbleStyles.forEach(key => {
                    const style = HoboTextEngine.styles[key];
                    if (style) cards[key] = HoboUI.createOutputCard(style.name, style.fn(text), output);
                });
            } else {
                bubbleStyles.forEach(key => {
                    const style = HoboTextEngine.styles[key];
                    if (style && cards[key]) HoboUI.updateOutputCard(cards[key], style.fn(text));
                });
            }
        }

        input.addEventListener('input', updateAll);
        updateAll();
    </script>
</body>
</html>
