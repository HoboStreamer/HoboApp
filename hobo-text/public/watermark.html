<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark Tool | watermark.hobo.tools</title>
    <meta name="description" content="Add text watermarks to images. Position, tile, adjust opacity and font. Download watermarked images.">
    <meta name="theme-color" content="#0b0c12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/shared.css">
    <script src="https://hobo.tools/shared/theme-loader.js"></script>
    <style>
        .wm-layout { display: grid; grid-template-columns: 1fr 320px; gap: 2rem; align-items: start; }
        .wm-preview { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; text-align: center; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
        .wm-preview canvas { max-width: 100%; height: auto; border-radius: 8px; }
        .wm-preview .placeholder { color: var(--text-muted); font-size: 1.1rem; }
        .wm-preview .placeholder i { font-size: 3rem; display: block; margin-bottom: 1rem; color: var(--border); }
        .drop-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; cursor: pointer; transition: all .2s; }
        .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(192,150,92,0.05); }
        .drop-zone input { display: none; }
        .wm-controls { display: flex; flex-direction: column; gap: 1rem; }
        .ctrl-group { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
        .ctrl-group h3 { margin: 0 0 .75rem; color: var(--accent); font-size: .9rem; }
        .ctrl-row { display: flex; gap: .75rem; align-items: center; margin-bottom: .6rem; }
        .ctrl-row label { min-width: 68px; font-size: .82rem; color: var(--text-secondary); }
        .ctrl-row select, .ctrl-row input[type="text"] { flex: 1; }
        .ctrl-row input[type="color"] { width: 38px; height: 30px; border: 1px solid var(--border); background: var(--bg-secondary); border-radius: 8px; cursor: pointer; padding: 2px; }
        .ctrl-row input[type="range"] { flex: 1; }
        .ctrl-row .val { min-width: 32px; text-align: right; font-size: .78rem; color: var(--text-muted); font-family: monospace; }
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .4rem; }
        .pos-btn { padding: .45rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary); font-size: .7rem; text-align: center; cursor: pointer; transition: all .15s; }
        .pos-btn:hover, .pos-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(192,150,92,0.1); }
        @media (max-width: 768px) { .wm-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="tool-wrap" style="max-width: 1000px;">
        <div class="page-header">
            <h1><i class="fas fa-droplet"></i> Watermark Tool</h1>
            <p class="subtitle">Upload an image and add a text watermark. Choose position, tile, or adjust opacity.</p>
        </div>

        <div class="wm-layout">
            <div>
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept="image/*">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--text-muted); margin-bottom: .5rem; display: block;"></i>
                    <p style="color: var(--text-secondary); margin: 0;">Click or drag an image here</p>
                </div>
                <div class="wm-preview" id="previewArea" style="margin-top: 1.5rem;">
                    <div class="placeholder" id="placeholder">
                        <i class="fas fa-image"></i>
                        Upload an image to preview
                    </div>
                    <canvas id="canvas" style="display: none;"></canvas>
                </div>
                <div style="display: flex; gap: .75rem; margin-top: 1rem; justify-content: center;">
                    <button class="btn btn-primary" id="dlBtn" onclick="dl()" disabled><i class="fas fa-download"></i> Download</button>
                </div>
            </div>

            <div class="wm-controls">
                <div class="ctrl-group">
                    <h3><i class="fas fa-pen"></i> Watermark Text</h3>
                    <div class="ctrl-row"><label>Text</label><input type="text" id="wmText" value="hobo.tools" placeholder="Watermark text..."></div>
                    <div class="ctrl-row"><label>Font</label><select id="wmFont"></select></div>
                    <div class="ctrl-row"><label>Size</label><input type="range" id="wmSize" min="10" max="80" value="24"><span class="val" id="wmSizeVal">24</span></div>
                </div>

                <div class="ctrl-group">
                    <h3><i class="fas fa-crosshairs"></i> Position</h3>
                    <div class="pos-grid" id="posGrid">
                        <button class="pos-btn" data-pos="top-left">↖ Top Left</button>
                        <button class="pos-btn" data-pos="top-center">↑ Top</button>
                        <button class="pos-btn" data-pos="top-right">↗ Top Right</button>
                        <button class="pos-btn" data-pos="center-left">← Left</button>
                        <button class="pos-btn" data-pos="center">● Center</button>
                        <button class="pos-btn" data-pos="center-right">→ Right</button>
                        <button class="pos-btn" data-pos="bottom-left">↙ Bot Left</button>
                        <button class="pos-btn active" data-pos="bottom-right">↘ Bot Right</button>
                        <button class="pos-btn" data-pos="tile">⊞ Tile</button>
                    </div>
                </div>

                <div class="ctrl-group">
                    <h3><i class="fas fa-sliders-h"></i> Style</h3>
                    <div class="ctrl-row"><label>Color</label><input type="color" id="wmColor" value="#ffffff"></div>
                    <div class="ctrl-row"><label>Opacity</label><input type="range" id="wmOpacity" min="5" max="100" value="30"><span class="val" id="wmOpacityVal">30%</span></div>
                    <div class="ctrl-row"><label>Padding</label><input type="range" id="wmPadding" min="5" max="80" value="20"><span class="val" id="wmPaddingVal">20</span></div>
                </div>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="https://logo.hobo.tools">Logo Hub</a>
                <a href="https://title.hobo.tools">Title Cards</a>
                <a href="https://transparent.hobo.tools">Transparent PNG</a>
                <a href="https://img.hobo.tools">HoboImg</a>
            </div>
            <p>&copy; 2025 Hobo Network</p>
        </footer>
    </div>

    <script src="https://hobo.tools/shared/navbar.js"></script>
    <script src="https://hobo.tools/shared/notification-ui.js"></script>
    <script src="https://hobo.tools/shared/account-switcher.js"></script>
    <script src="/js/logo-engine.js"></script>
    <script src="/js/shared.js"></script>
    <script>
        HoboUI.initPage();
        const E = HoboLogoEngine;
        const canvas = document.getElementById('canvas');
        let loadedImg = null;
        let position = 'bottom-right';

        // Populate fonts
        const fontSel = document.getElementById('wmFont');
        E.fonts.forEach(f => { const o = document.createElement('option'); o.value = f; o.textContent = f; if (f === 'Inter') o.selected = true; fontSel.appendChild(o); });

        // Position buttons
        document.querySelectorAll('.pos-btn').forEach(btn => {
            btn.onclick = () => {
                position = btn.dataset.pos;
                document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderPreview();
            };
        });

        // File handling
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        ['dragenter', 'dragover'].forEach(evt => dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('drag-over'); }));
        ['dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); }));
        dropZone.addEventListener('drop', e => { if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return HoboUI.showToast('Please upload an image file', 'error');
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => { loadedImg = img; document.getElementById('placeholder').style.display = 'none'; canvas.style.display = 'block'; document.getElementById('dlBtn').disabled = false; renderPreview(); };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function renderPreview() {
            if (!loadedImg) return;
            const opacity = +document.getElementById('wmOpacity').value / 100;
            const color = hexToRgba(document.getElementById('wmColor').value, opacity);
            E.renderWatermark(canvas, loadedImg, document.getElementById('wmText').value || 'watermark', {
                font: fontSel.value,
                fontSize: +document.getElementById('wmSize').value,
                color,
                position,
                padding: +document.getElementById('wmPadding').value,
            });
        }

        function dl() {
            if (!loadedImg) return;
            E.download(canvas, 'watermarked.png', 'png');
        }

        function updateVals() {
            document.getElementById('wmSizeVal').textContent = document.getElementById('wmSize').value;
            document.getElementById('wmOpacityVal').textContent = document.getElementById('wmOpacity').value + '%';
            document.getElementById('wmPaddingVal').textContent = document.getElementById('wmPadding').value;
        }

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', () => { updateVals(); renderPreview(); });
        });
        updateVals();
    </script>
</body>
</html>
