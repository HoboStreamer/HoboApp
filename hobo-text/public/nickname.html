<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nickname Generator — Gaming Tags & Usernames | nickname.hobo.tools</title>
    <meta name="description" content="Generate unique gaming tags, usernames, and screen names in multiple styles.">
    <meta name="theme-color" content="#0b0c12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/shared.css">
    <script src="https://hobo.tools/shared/theme-loader.js"></script>
</head>
<body>
    <div class="tool-wrap">
        <div class="page-header">
            <h1><i class="fas fa-user-tag"></i> Nickname Generator</h1>
            <p class="subtitle">Generate unique gaming tags, usernames, and screen names. Click any to copy.</p>
        </div>

        <div class="tool-section">
            <div class="btn-row" style="justify-content: center; margin-bottom: 20px;">
                <button class="btn btn-primary btn-lg" onclick="generate()"><i class="fas fa-rotate"></i> Generate Nicknames</button>
            </div>
            <div id="output" class="output-grid" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));"></div>
        </div>

        <div class="tool-section">
            <h2><i class="fas fa-wand-magic-sparkles"></i> Style Your Nickname</h2>
            <p style="color: var(--text-secondary); margin-bottom: 12px;">Copy a nickname, then style it with Unicode fonts!</p>
            <div class="btn-row">
                <a href="https://fancy.hobo.tools" class="btn btn-secondary"><i class="fas fa-wand-magic-sparkles"></i> Fancy Text</a>
                <a href="https://bio.hobo.tools" class="btn btn-secondary"><i class="fas fa-address-card"></i> Bio Generator</a>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="https://text.hobo.tools">HoboText Hub</a>
                <a href="https://bio.hobo.tools">Bio Generator</a>
                <a href="https://fancy.hobo.tools">Fancy Text</a>
            </div>
            <p>&copy; 2025 Hobo Network</p>
        </footer>
    </div>

    <script src="https://hobo.tools/shared/navbar.js"></script>
    <script src="https://hobo.tools/shared/notification-ui.js"></script>
    <script src="https://hobo.tools/shared/account-switcher.js"></script>
    <script src="/js/text-engine.js"></script>
    <script src="/js/shared.js"></script>
    <script>
        HoboUI.initPage();
        const output = document.getElementById('output');

        function generate() {
            output.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const nick = HoboTextEngine.generateNickname();
                HoboUI.createOutputCard(`#${i + 1}`, nick, output);
            }
        }

        generate();
    </script>
</body>
</html>
