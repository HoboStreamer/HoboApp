<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Generator — Social Media Bio Maker | bio.hobo.tools</title>
    <meta name="description" content="Generate creative social media bios with fancy borders, symbols, and emoji. Perfect for Twitch, YouTube, Discord, Twitter.">
    <meta name="theme-color" content="#0b0c12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/shared.css">
    <script src="https://hobo.tools/shared/theme-loader.js"></script>
</head>
<body>
    <div class="tool-wrap">
        <div class="page-header">
            <h1><i class="fas fa-address-card"></i> Bio Generator</h1>
            <p class="subtitle">Generate creative social media bios. Click regenerate for new variations.</p>
        </div>

        <div class="tool-section">
            <div class="btn-row" style="justify-content: center; margin-bottom: 20px;">
                <button class="btn btn-primary btn-lg" onclick="generate()"><i class="fas fa-rotate"></i> Generate New Bios</button>
            </div>
            <div id="output" class="output-grid" style="grid-template-columns: 1fr;"></div>
        </div>

        <div class="tool-section">
            <h2><i class="fas fa-link"></i> Combine with Fancy Text</h2>
            <p style="color: var(--text-secondary); margin-bottom: 12px;">Generate a bio, then style it with <a href="https://fancy.hobo.tools">Fancy Text</a> for extra flair!</p>
            <div class="btn-row">
                <a href="https://fancy.hobo.tools" class="btn btn-secondary"><i class="fas fa-wand-magic-sparkles"></i> Fancy Text</a>
                <a href="https://symbols.hobo.tools" class="btn btn-secondary"><i class="fas fa-icons"></i> Symbols</a>
                <a href="https://kaomoji.hobo.tools" class="btn btn-secondary"><i class="fas fa-face-smile-beam"></i> Kaomoji</a>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="https://text.hobo.tools">HoboText Hub</a>
                <a href="https://nickname.hobo.tools">Nickname Generator</a>
                <a href="https://fancy.hobo.tools">Fancy Text</a>
            </div>
            <p>&copy; 2025 Hobo Network</p>
        </footer>
    </div>

    <script src="https://hobo.tools/shared/navbar.js"></script>
    <script src="https://hobo.tools/shared/notification-ui.js"></script>
    <script src="https://hobo.tools/shared/account-switcher.js"></script>
    <script src="/js/text-engine.js"></script>
    <script src="/js/shared.js"></script>
    <script>
        HoboUI.initPage();
        const output = document.getElementById('output');

        function generate() {
            output.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const bio = HoboTextEngine.generateBio();
                HoboUI.createOutputCard(`Bio #${i + 1}`, bio, output);
            }
        }

        generate();
    </script>
</body>
</html>
