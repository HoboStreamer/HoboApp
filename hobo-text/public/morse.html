<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Code Translator | morse.hobo.tools</title>
    <meta name="description" content="Translate text to Morse code and back. Dots and dashes for your inner telegraph operator.">
    <meta name="theme-color" content="#0b0c12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/shared.css">
    <script src="https://hobo.tools/shared/theme-loader.js"></script>
</head>
<body>
    <div class="tool-wrap">
        <div class="page-header">
            <h1><i class="fas fa-signal"></i> Morse Code</h1>
            <p class="subtitle">Translate between text and Morse code ·· — both directions.</p>
        </div>

        <div class="tool-section">
            <div class="pill-tabs">
                <button class="pill-tab active" id="tabEncode" onclick="setMode('encode')">Text → Morse</button>
                <button class="pill-tab" id="tabDecode" onclick="setMode('decode')">Morse → Text</button>
            </div>
            <div class="input-group">
                <label id="inputLabel">Text</label>
                <textarea id="input" class="large" placeholder="Type your text..." autofocus>SOS</textarea>
            </div>
        </div>

        <div class="tool-section">
            <h2><i class="fas fa-terminal"></i> Output</h2>
            <div id="output" class="output-box mono" style="font-size: 1.2rem; letter-spacing: 0.15em;"></div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="HoboUI.copyText(document.getElementById('output').textContent)"><i class="fas fa-copy"></i> Copy</button>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="https://text.hobo.tools">HoboText Hub</a>
                <a href="https://binary.hobo.tools">Binary</a>
                <a href="https://fancy.hobo.tools">Fancy Text</a>
            </div>
            <p>&copy; 2025 Hobo Network</p>
        </footer>
    </div>

    <script src="https://hobo.tools/shared/navbar.js"></script>
    <script src="https://hobo.tools/shared/notification-ui.js"></script>
    <script src="https://hobo.tools/shared/account-switcher.js"></script>
    <script src="/js/text-engine.js"></script>
    <script src="/js/shared.js"></script>
    <script>
        HoboUI.initPage();
        let mode = 'encode';
        function setMode(m) {
            mode = m;
            document.getElementById('tabEncode').classList.toggle('active', m === 'encode');
            document.getElementById('tabDecode').classList.toggle('active', m === 'decode');
            document.getElementById('inputLabel').textContent = m === 'encode' ? 'Text' : 'Morse Code';
            document.getElementById('input').placeholder = m === 'encode' ? 'Type your text...' : 'Enter morse code (dots and dashes)...';
            update();
        }
        function update() {
            const text = document.getElementById('input').value;
            document.getElementById('output').textContent = mode === 'encode' ? HoboTextEngine.toMorse(text) : HoboTextEngine.fromMorse(text);
        }
        document.getElementById('input').addEventListener('input', update);
        update();
    </script>
</body>
</html>
