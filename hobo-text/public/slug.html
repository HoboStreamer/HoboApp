<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Slug Generator | slug.hobo.tools</title>
    <meta name="description" content="Convert titles into URL-friendly slugs. Strip diacritics, normalize whitespace, clean special characters.">
    <meta name="theme-color" content="#0b0c12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/shared.css">
    <script src="https://hobo.tools/shared/theme-loader.js"></script>
</head>
<body>
    <div class="tool-wrap">
        <div class="page-header">
            <h1><i class="fas fa-link"></i> Slug Generator</h1>
            <p class="subtitle">Convert titles and text into clean, URL-friendly slugs.</p>
        </div>

        <div class="tool-section">
            <div class="input-group">
                <label>Title / Text</label>
                <input type="text" id="input" value="Hello World! This is a Test — With Special Characters & Stuff" placeholder="Enter a title..." autofocus>
            </div>
            <div class="live-hint"><span class="live-dot"></span> Results update as you type</div>
            <div class="generate-row">
                <button class="btn btn-primary generate-btn" onclick="document.querySelector('#input, input[type=text]').dispatchEvent(new Event('input', {bubbles:true}))"><i class="fas fa-bolt"></i> Generate</button>
            </div>
        </div>

        <div class="tool-section">
            <h2><i class="fas fa-link"></i> Slug</h2>
            <div id="output" class="output-box mono" style="font-size: 1.1rem; cursor: pointer;" onclick="HoboUI.copyText(this.textContent)"></div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="HoboUI.copyText(document.getElementById('output').textContent)"><i class="fas fa-copy"></i> Copy</button>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="https://text.hobo.tools">HoboText Hub</a>
                <a href="https://case.hobo.tools">Case Converter</a>
                <a href="https://clean.hobo.tools">Text Cleaner</a>
            </div>
            <p>&copy; 2025 Hobo Network</p>
        </footer>
    </div>

    <script src="https://hobo.tools/shared/navbar.js"></script>
    <script src="https://hobo.tools/shared/notification-ui.js"></script>
    <script src="https://hobo.tools/shared/account-switcher.js"></script>
    <script src="/js/text-engine.js"></script>
    <script src="/js/shared.js"></script>
    <script>
        HoboUI.initPage();
        function update() { document.getElementById('output').textContent = HoboTextEngine.toSlug(document.getElementById('input').value); }
        document.getElementById('input').addEventListener('input', update);
        update();
    </script>
</body>
</html>
