# ═══════════════════════════════════════════════════════════════
# HoboText + HoboLogo — Nginx Vhost
# Single backend serving all text + logo subdomains.
# ═══════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name
        text.hobo.tools type.hobo.tools fonts.hobo.tools
        fancy.hobo.tools zalgo.hobo.tools ascii.hobo.tools
        symbols.hobo.tools unicode.hobo.tools bubble.hobo.tools
        glitch.hobo.tools smallcaps.hobo.tools cursive.hobo.tools
        gothic.hobo.tools wide.hobo.tools monospaced.hobo.tools
        braille.hobo.tools morse.hobo.tools binary.hobo.tools
        case.hobo.tools caps.hobo.tools titlecase.hobo.tools
        clean.hobo.tools strip.hobo.tools
        count.hobo.tools lines.hobo.tools sort.hobo.tools
        dedupe.hobo.tools slug.hobo.tools compare.hobo.tools
        diff.hobo.tools markdown.hobo.tools json.hobo.tools
        escape.hobo.tools bio.hobo.tools nickname.hobo.tools
        username.hobo.tools gamertag.hobo.tools kaomoji.hobo.tools
        emojis.hobo.tools copypaste.hobo.tools banner.hobo.tools
        textart.hobo.tools figlet.hobo.tools
        logo.hobo.tools title.hobo.tools wordmark.hobo.tools
        textlogo.hobo.tools transparent.hobo.tools badge.hobo.tools
        sticker.hobo.tools thumbnail.hobo.tools cover.hobo.tools
        channelart.hobo.tools watermark.hobo.tools neon.hobo.tools
        overlay.hobo.tools lowerthird.hobo.tools
        ice.hobo.tools peso.hobo.tools currency.hobo.tools
        mxn.hobo.tools spanish.hobo.tools espanol.hobo.tools
        slang.hobo.tools;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name
        text.hobo.tools type.hobo.tools fonts.hobo.tools
        fancy.hobo.tools zalgo.hobo.tools ascii.hobo.tools
        symbols.hobo.tools unicode.hobo.tools bubble.hobo.tools
        glitch.hobo.tools smallcaps.hobo.tools cursive.hobo.tools
        gothic.hobo.tools wide.hobo.tools monospaced.hobo.tools
        braille.hobo.tools morse.hobo.tools binary.hobo.tools
        case.hobo.tools caps.hobo.tools titlecase.hobo.tools
        clean.hobo.tools strip.hobo.tools
        count.hobo.tools lines.hobo.tools sort.hobo.tools
        dedupe.hobo.tools slug.hobo.tools compare.hobo.tools
        diff.hobo.tools markdown.hobo.tools json.hobo.tools
        escape.hobo.tools bio.hobo.tools nickname.hobo.tools
        username.hobo.tools gamertag.hobo.tools kaomoji.hobo.tools
        emojis.hobo.tools copypaste.hobo.tools banner.hobo.tools
        textart.hobo.tools figlet.hobo.tools
        logo.hobo.tools title.hobo.tools wordmark.hobo.tools
        textlogo.hobo.tools transparent.hobo.tools badge.hobo.tools
        sticker.hobo.tools thumbnail.hobo.tools cover.hobo.tools
        channelart.hobo.tools watermark.hobo.tools neon.hobo.tools
        overlay.hobo.tools lowerthird.hobo.tools
        ice.hobo.tools peso.hobo.tools currency.hobo.tools
        mxn.hobo.tools spanish.hobo.tools espanol.hobo.tools
        slang.hobo.tools;

    ssl_certificate     /etc/letsencrypt/live/hobo.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hobo.tools/privkey.pem;

    access_log /var/log/nginx/text.hobo.tools.access.log;
    error_log  /var/log/nginx/text.hobo.tools.error.log;

    client_max_body_size 20m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Static assets + hostname routing
    location / {
        proxy_pass http://127.0.0.1:3600;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
