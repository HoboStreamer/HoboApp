# ═══════════════════════════════════════════════════════════════
# hobo.quest — Nginx Configuration
# Proxy to hobo-quest Node.js server on port 3200
# Cloudflare handles TLS; this listens on port 80 only.
# ═══════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=hoboquest_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=hoboquest_auth:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name hobo.quest www.hobo.quest;

    client_max_body_size 2m;

    # ── Auth callback / login ───────────────────────────────
    location /auth/ {
        limit_req zone=hoboquest_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=hoboquest_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static / SPA + WebSocket ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
