# ═══════════════════════════════════════════════════════════════
# maps.hobo.tools — Nginx Configuration
# Proxy to hobo-maps Node.js server on port 3300
# Uses existing *.hobo.tools wildcard TLS cert
# ═══════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=hobomaps_api:10m rate=10r/s;

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name maps.hobo.tools;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name maps.hobo.tools;

    ssl_certificate     /etc/letsencrypt/live/hobo.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hobo.tools/privkey.pem;

    access_log /var/log/nginx/maps.hobo.tools.access.log;
    error_log  /var/log/nginx/maps.hobo.tools.error.log;

    client_max_body_size 2m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── SSE streaming (no buffering) ───────────────────────────
    location = /api/search/stream {
        limit_req zone=hobomaps_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding off;
    }

    # ── API (rate limited) ──────────────────────────────────
    location /api/ {
        limit_req zone=hobomaps_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Static / SPA ────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
